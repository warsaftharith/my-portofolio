<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favico.png" />

    <!-- Primary SEO -->
    <title>Warsa - Web Developer Portfolio</title>

    <meta
      name="description"
      content="Portfolio Warsa - Web Developer yang fokus pada pembuatan website modern, cepat, dan responsif menggunakan React, Tailwind, dan teknologi terbaru."
    />

    <meta
      name="keywords"
      content="Warsa, Web Developer, Portfolio, React Developer, Frontend Developer Indonesia"
    />

    <meta name="author" content="Warsa" />

    <meta name="robots" content="index, follow" />

    <meta property="og:type" content="website" />

    <meta
      property="og:title"
      content="Warsa - Web Developer Portfolio"
    />

    <meta
      property="og:description"
      content="Portfolio profesional Warsa - Web Developer modern."
    />

    <meta
      property="og:image"
      content="https://portofolio-warsa.my.id/preview.png"
    />

    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Warsa - Web Developer Portfolio"
    />

    <meta
      name="twitter:description"
      content="Portfolio profesional Warsa - Web Developer modern."
    />

    <meta
      name="twitter:image"
      content="https://portofolio-warsa.my.id/preview.png"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
